 *
 * This project uses @Incubating APIs which are subject to change.
 */

plugins {
    id 'java-library'
    id 'maven-publish'
    id 'application'
}

dependencies {
    api libs.litiengine
    api libs.log4j.api
    api libs.log4j.core
    compileOnly libs.lombok
    annotationProcessor libs.lombok

    testCompileOnly libs.lombok
    testAnnotationProcessor libs.lombok
}

group = 'me.rochblondiaux'
version = '1.0'
description = 'Kings-And-Pigs'

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(25))
    }
}
publishing {
    publications {
        maven(MavenPublication) {
            from(components.java)
        }
    }
}

application {
    mainClass = 'me.rochblondiaux.kingsnpigs.GameLauncher'
}
